<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡樸房管理系統 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div id="app" class="max-w-6xl mx-auto p-4">
        
        <div v-if="!session" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg border border-gray-200">
            <h2 class="text-3xl font-black mb-6 text-center text-blue-700">{{ isRegistering ? '管理員註冊' : '管理員登入' }}</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1">電郵地址</label>
                    <input v-model="email" type="email" placeholder="example@mail.com" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">密碼</label>
                    <input v-model="password" type="password" placeholder="******" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <button @click="handleAuth" :disabled="loading" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition disabled:bg-gray-400">
                    {{ loading ? '處理中...' : (isRegistering ? '立即註冊' : '安全登入') }}
                </button>
                
                <div class="text-center mt-4">
                    <button @click="isRegistering = !isRegistering" class="text-blue-500 hover:underline text-sm font-semibold">
                        {{ isRegistering ? '已有帳號？按此登入' : '沒有帳號？按此註冊管理員' }}
                    </button>
                </div>
            </div>
            
            <div v-if="authError" class="mt-4 p-3 bg-red-100 text-red-600 text-sm rounded border border-red-200">
                {{ authError }}
            </div>
        </div>

        <div v-else>
            <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm">
                <h1 class="text-2xl font-black text-gray-800">租務系統控制台</h1>
                <div class="flex items-center gap-4">
                    <input type="month" v-model="currentMonth" @change="fetchData" class="p-2 border rounded font-bold">
                    <button @click="handleLogout" class="text-sm font-bold text-gray-500 hover:text-red-500">登出</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border-t-4 border-blue-500">
                <h3 class="font-bold mb-4 flex items-center gap-2">🏠 新增房產/單位</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input v-model="newRoom.property_name" placeholder="物業名稱 (如：康樂)" class="p-2 border rounded">
                    <input v-model="newRoom.room_name" placeholder="房間 (如：A室)" class="p-2 border rounded">
                    <input v-model="newRoom.base_rent" type="number" placeholder="底租" class="p-2 border rounded">
                    <button @click="addRoom" class="bg-blue-500 text-white font-bold rounded hover:bg-blue-600 transition">新增</button>
                </div>
            </div>

            <div v-for="(rooms, propName) in groupedRooms" :key="propName" class="mb-10">
                <div class="flex items-center justify-between mb-4 bg-gray-200 p-3 rounded-lg">
                    <h2 class="text-xl font-black">{{ propName }}</h2>
                    <div class="flex gap-4 items-center bg-white p-2 rounded shadow-inner">
                        <span class="text-sm font-bold">當月總電費：</span>
                        <input v-model="electricityTotals[propName].total_bill_amount" @blur="saveElectricityTotal(propName)" type="number" placeholder="$ 總額" class="w-24 p-1 border rounded text-sm">
                        <input v-model="electricityTotals[propName].total_units_used" @blur="saveElectricityTotal(propName)" type="number" placeholder="總度數" class="w-24 p-1 border rounded text-sm">
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 font-bold">房號</th>
                                <th class="p-4 font-bold">租戶</th>
                                <th class="p-4 font-bold">底租</th>
                                <th class="p-4 font-bold text-blue-600">本月度數</th>
                                <th class="p-4 font-bold text-green-600">預繳電費</th>
                                <th class="p-4 font-bold">實際電費</th>
                                <th class="p-4 font-bold">需補/退</th>
                                <th class="p-4 font-bold text-center">狀態</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="room in rooms" :key="room.id" class="border-b hover:bg-gray-50 transition">
                                <td class="p-4 font-bold text-lg">{{ room.room_name }}</td>
                                <td class="p-4"><input v-model="room.tenant_name" @blur="updateTenant(room)" class="w-24 border-b border-transparent focus:border-blue-400 outline-none"></td>
                                <td class="p-4 text-gray-500">${{ room.base_rent }}</td>
                                <td class="p-4 bg-blue-50"><input v-model="room.record.electricity_units" @blur="saveRecord(room)" type="number" class="w-16 p-1 border rounded"></td>
                                <td class="p-4 bg-green-50"><input v-model="room.record.prepaid_electricity" @blur="saveRecord(room)" type="number" class="w-16 p-1 border rounded"></td>
                                <td class="p-4 text-orange-600 font-bold">${{ calculateActualFee(propName, room.record.electricity_units) }}</td>
                                <td class="p-4 font-black">
                                    <span :class="getBalance(propName, room).color">
                                        {{ getBalance(propName, room).text }}
                                    </span>
                                </td>
                                <td class="p-4 text-center">
                                    <input type="checkbox" v-model="room.record.rent_paid" @change="saveRecord(room)" class="w-5 h-5">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 請務必將這裡換成你的正確資料
        const supabaseUrl = 'https://duneupvlgjxbqkuosaqp.supabase.co'; 
        const supabaseKey = 'sb_publishable_FgzUFLNiaF2cOrheTzYsAA_3oU2LBaG';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const app = Vue.createApp({
            data() {
                return {
                    session: null,
                    email: '',
                    password: '',
                    isRegistering: false,
                    loading: false,
                    authError: null,
                    currentMonth: new Date().toISOString().slice(0, 7),
                    rawRooms: [],
                    electricityTotals: {},
                    newRoom: { property_name: '', room_name: '', base_rent: '' }
                }
            },
            computed: {
                groupedRooms() {
                    const groups = {};
                    this.rawRooms.forEach(room => {
                        if (!groups[room.property_name]) {
                            groups[room.property_name] = [];
                            if (!this.electricityTotals[room.property_name]) {
                                this.electricityTotals[room.property_name] = { total_bill_amount: 0, total_units_used: 0 };
                            }
                        }
                        groups[room.property_name].push(room);
                    });
                    return groups;
                }
            },
            async mounted() {
                const { data } = await supabase.auth.getSession();
                this.session = data.session;
                if (this.session) this.fetchData();
            },
            methods: {
                async handleAuth() {
                    this.loading = true;
                    this.authError = null;
                    try {
                        let result;
                        if (this.isRegistering) {
                            result = await supabase.auth.signUp({ email: this.email, password: this.password });
                            if (!result.error) alert('註冊成功！請查看電郵驗證（或直接嘗試登入）。');
                        } else {
                            result = await supabase.auth.signInWithPassword({ email: this.email, password: this.password });
                        }
                        
                        if (result.error) throw result.error;
                        this.session = result.data.session;
                        if (this.session) this.fetchData();
                    } catch (err) {
                        this.authError = err.message;
                    } finally {
                        this.loading = false;
                    }
                },
                async handleLogout() {
                    await supabase.auth.signOut();
                    this.session = null;
                },
                calculateActualFee(propName, units) {
                    const total = this.electricityTotals[propName];
                    if (!total || !total.total_units_used || !units) return 0;
                    return Math.round((total.total_bill_amount / total.total_units_used) * units);
                },
                getBalance(propName, room) {
                    const actual = this.calculateActualFee(propName, room.record.electricity_units);
                    const prepaid = room.record.prepaid_electricity || 0;
                    const diff = actual - prepaid;
                    
                    if (this.electricityTotals[propName].total_bill_amount === 0) return { text: '-', color: 'text-gray-300' };
                    if (diff > 0) return { text: `補 $${diff}`, color: 'text-red-500' };
                    if (diff < 0) return { text: `退 $${Math.abs(diff)}`, color: 'text-green-500' };
                    return { text: '清', color: 'text-gray-400' };
                },
                async fetchData() {
                    const { data: rooms } = await supabase.from('rooms').select('*').order('room_name');
                    const { data: records } = await supabase.from('monthly_records').select('*').eq('billing_month', this.currentMonth);
                    const { data: elecData } = await supabase.from('property_electricity').select('*').eq('billing_month', this.currentMonth);

                    this.electricityTotals = {};
                    elecData?.forEach(e => { this.electricityTotals[e.property_name] = e; });

                    this.rawRooms = rooms.map(room => {
                        const existing = records?.find(r => r.room_id === room.id);
                        room.record = existing || { room_id: room.id, billing_month: this.currentMonth, rent_paid: false, electricity_units: 0, prepaid_electricity: 0 };
                        return room;
                    });
                },
                async updateTenant(room) {
                    await supabase.from('rooms').update({ tenant_name: room.tenant_name }).eq('id', room.id);
                },
                async saveRecord(room) {
                    const payload = {
                        room_id: room.id,
                        billing_month: this.currentMonth,
                        rent_paid: room.record.rent_paid,
                        electricity_units: room.record.electricity_units || 0,
                        prepaid_electricity: room.record.prepaid_electricity || 0
                    };
                    await supabase.from('monthly_records').upsert(payload, { onConflict: 'room_id, billing_month' });
                },
                async saveElectricityTotal(propName) {
                    const t = this.electricityTotals[propName];
                    await supabase.from('property_electricity').upsert({
                        property_name: propName, billing_month: this.currentMonth,
                        total_bill_amount: t.total_bill_amount || 0,
                        total_units_used: t.total_units_used || 0
                    }, { onConflict: 'property_name, billing_month' });
                },
                async addRoom() {
                    if (!this.newRoom.property_name || !this.newRoom.room_name) return;
                    await supabase.from('rooms').insert([this.newRoom]);
                    this.newRoom = { property_name: '', room_name: '', base_rent: '' };
                    this.fetchData();
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
